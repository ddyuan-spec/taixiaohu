<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f9fa;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .diagram {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 24px;
        }
        .container {
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 24px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
        }
        .container-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .option-box {
            padding: 16px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
            background: white;
            border: 2px solid #e0e0e8;
        }
        .option-box .label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .option-box .code {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
        .arrow-down {
            text-align: center;
            color: #999;
            font-size: 20px;
            margin: 8px 0;
        }
        .prompt-box {
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 120px;
            background: #e6f4ea;
            border: 2px solid #52c41a;
            font-size: 12px;
            color: #137333;
        }
        .prompt-box.optional {
            background: #fff7e6;
            border-color: #fa8c16;
            color: #d46b08;
        }
        .prompt-box.boundary {
            background: #f9f0ff;
            border-color: #722ed1;
            color: #531dab;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <div class="title">客户端意图选择路由</div>
        <div class="container">
            <div class="container-title">客户端意图选择</div>
            
            <div class="row">
                <div class="option-box">
                    <div class="label">健康咨询</div>
                    <div class="code">health_consult</div>
                </div>
                <div class="option-box">
                    <div class="label">产品咨询</div>
                    <div class="code">product_consult</div>
                </div>
                <div class="option-box">
                    <div class="label">健康知识</div>
                    <div class="code">knowledge_query</div>
                </div>
                <div class="option-box">
                    <div class="label">其他</div>
                    <div class="code">other</div>
                </div>
            </div>
            
            <div class="arrow-down">▼ ▼ ▼ ▼</div>
            
            <div class="row">
                <div class="prompt-box">
                    <strong>症状分析</strong><br>Prompt
                </div>
                <div class="prompt-box">
                    <strong>产品咨询</strong><br>Prompt
                </div>
                <div class="prompt-box">
                    <strong>健康知识</strong><br>问答Prompt
                </div>
                <div class="prompt-box boundary">
                    <strong>边界</strong><br>处理Prompt
                </div>
            </div>
            
            <div class="row" style="justify-content: flex-start; padding-left: 40px;">
                <div class="arrow-down">▼</div>
                <div class="arrow-down" style="margin-left: 100px;">▼</div>
            </div>
            
            <div class="row" style="justify-content: flex-start; padding-left: 20px;">
                <div class="prompt-box optional">
                    <strong>推荐生成</strong><br>Prompt（可选）
                </div>
                <div class="prompt-box optional" style="margin-left: 40px;">
                    <strong>推荐生成</strong><br>Prompt（可选）
                </div>
            </div>
        </div>
    </div>
</body>
</html>
