<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f9fa;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .diagram {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 30px;
        }
        .flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .box {
            padding: 16px 24px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            min-width: 200px;
            position: relative;
        }
        .box.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
        }
        .box.system {
            background: #e8f4fd;
            border: 2px solid #1890ff;
            color: #096dd9;
        }
        .box.intent {
            background: #fff7e6;
            border: 2px solid #fa8c16;
            color: #d46b08;
        }
        .box.prompt {
            background: #f6ffed;
            border: 2px solid #52c41a;
            color: #389e0d;
            font-size: 12px;
            padding: 12px 16px;
        }
        .box.disclaimer {
            background: #fff1f0;
            border: 2px solid #ff4d4f;
            color: #cf1322;
            font-size: 12px;
            padding: 12px 16px;
        }
        .box.output {
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: white;
            font-weight: 500;
        }
        .arrow {
            width: 2px;
            height: 20px;
            background: #ccc;
            position: relative;
        }
        .arrow::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ccc;
        }
        .branch-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 8px 0;
        }
        .branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .merge-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 30px;
            position: relative;
        }
        .merge-arrow::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 100%;
            background: #ccc;
        }
        .merge-arrow::after {
            content: '';
            position: absolute;
            bottom: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ccc;
        }
        .label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <div class="title">Prompt体系架构图</div>
        <div class="flow-container">
            <div class="box user">用户输入（自然语言）</div>
            <div class="arrow"></div>
            <div class="box system">
                <strong>System Prompt</strong><br>
                <span style="font-size: 12px;">角色定义 · 能力边界 · 安全红线</span>
            </div>
            <div class="arrow"></div>
            <div class="box intent">
                <strong>客户端意图选择</strong><br>
                <span style="font-size: 12px;">健康咨询 | 产品咨询 | 健康知识 | 其他</span>
            </div>
            <div class="arrow"></div>
            <div class="branch-container">
                <div class="branch">
                    <div class="box prompt">症状分析 Prompt<br>symptom_v1.0</div>
                    <div class="arrow"></div>
                    <div class="box prompt">推荐生成 Prompt<br>recommend_v1.0</div>
                    <div class="arrow"></div>
                    <div class="box disclaimer">免责声明 Prompt<br>disclaimer_v1.0</div>
                </div>
                <div class="branch">
                    <div class="box prompt">产品咨询 Prompt<br>product_v1.0</div>
                    <div class="arrow"></div>
                    <div class="box prompt">推荐生成 Prompt<br>recommend_v1.0</div>
                </div>
                <div class="branch">
                    <div class="box prompt">健康知识问答<br>knowledge_v1.0</div>
                    <div class="arrow"></div>
                    <div class="box disclaimer">免责声明<br>disclaimer_v1.0</div>
                </div>
                <div class="branch">
                    <div class="box prompt">边界处理<br>boundary_v1.0</div>
                </div>
            </div>
            <div class="merge-arrow"></div>
            <div class="box output">最终输出（用户可见）</div>
        </div>
    </div>
</body>
</html>
