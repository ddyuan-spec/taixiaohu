<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提示词版本管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 24px; font-weight: 500; }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 80px);
        }
        .sidebar {
            width: 300px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            height: fit-content;
        }
        .sidebar h2 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .node-list { list-style: none; }
        .node-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e8e8f0;
        }
        .node-item:hover { background: #f8f9ff; border-color: #667eea; }
        .node-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .node-item.active .node-actions { opacity: 1; }
        .node-name { font-weight: 500; font-size: 14px; }
        .node-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .node-item:hover .node-actions { opacity: 1; }
        .btn-icon {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            color: inherit;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.4); }
        .btn-add {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 2px dashed #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-add:hover {
            background: #f8f9ff;
            border-style: solid;
        }
        .main-content {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8e8f0;
        }
        .node-header h2 { font-size: 20px; color: #1a1a2e; }
        .version-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .version-tab {
            padding: 10px 20px;
            border: 1px solid #e8e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .version-tab:hover { border-color: #667eea; color: #667eea; }
        .version-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .version-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-current { background: #e6f7ff; color: #1890ff; }
        .badge-preview { background: #f6ffed; color: #52c41a; }
        .version-tab.active .badge-current,
        .version-tab.active .badge-preview { background: rgba(255,255,255,0.3); color: white; }
        .prompt-section {
            margin-bottom: 24px;
        }
        .prompt-section h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .prompt-editor {
            width: 100%;
            min-height: 300px;
            padding: 16px;
            border: 1px solid #e8e8f0;
            border-radius: 8px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .prompt-editor:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .actions-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e8e8f0;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: #f0f2f5;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e2e5; }
        .btn-success {
            background: #52c41a;
            color: white;
        }
        .btn-success:hover { opacity: 0.9; }
        .btn-warning {
            background: #fa8c16;
            color: white;
        }
        .btn-warning:hover { opacity: 0.9; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            transform: translateY(-20px);
            transition: transform 0.3s;
        }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { font-size: 18px; }
        .modal-close {
            width: 32px; height: 32px;
            border: none;
            background: #f0f2f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #e0e2e5; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e8e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .diff-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }
        .diff-panel {
            border: 1px solid #e8e8f0;
            border-radius: 8px;
            padding: 16px;
            background: #fafafa;
        }
        .diff-panel h4 {
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8e8f0;
        }
        .diff-content {
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .diff-added { background: #d4edda; color: #155724; padding: 2px 4px; border-radius: 3px; }
        .diff-removed { background: #f8d7da; color: #721c24; padding: 2px 4px; border-radius: 3px; text-decoration: line-through; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .toast-success { background: #52c41a; }
        .toast-error { background: #f5222d; }
        .toast-info { background: #1890ff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 提示词版本管理系统</h1>
        <div style="margin-top: 10px; font-size: 13px; opacity: 0.9;">
            <span>数据存储: GitHub</span>
            <button onclick="clearToken()" style="margin-left: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;">清除 Token</button>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <h2>工作流节点</h2>
            <ul class="node-list" id="nodeList"></ul>
            <button class="btn-add" onclick="showAddNodeModal()">+ 新增节点</button>
        </div>
        <div class="main-content" id="mainContent">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>请选择一个工作流节点查看或编辑提示词</p>
            </div>
        </div>
    </div>

    <!-- 新增/编辑节点模态框 -->
    <div class="modal-overlay" id="nodeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="nodeModalTitle">新增节点</h3>
                <button class="modal-close" onclick="closeModal('nodeModal')">×</button>
            </div>
            <div class="form-group">
                <label>节点名称</label>
                <input type="text" class="form-input" id="nodeNameInput" placeholder="请输入节点名称">
            </div>
            <div class="actions-bar" style="margin-top: 24px;">
                <button class="btn btn-primary" onclick="saveNode()">保存</button>
                <button class="btn btn-secondary" onclick="closeModal('nodeModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 对比模态框 -->
    <div class="modal-overlay" id="diffModal">
        <div class="modal" style="max-width: 1000px;">
            <div class="modal-header">
                <h3>版本对比</h3>
                <button class="modal-close" onclick="closeModal('diffModal')">×</button>
            </div>
            <div class="diff-container">
                <div class="diff-panel">
                    <h4>现有版本</h4>
                    <div class="diff-content" id="diffCurrent"></div>
                </div>
                <div class="diff-panel">
                    <h4>预更新版本</h4>
                    <div class="diff-content" id="diffPreview"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // GitHub 配置
        const GITHUB_CONFIG = {
            owner: 'ddyuan-spec',
            repo: 'taixiaohu',
            path: 'prompt-manager/data.json',
            branch: 'main'
        };

        // 数据存储
        let nodes = [];
        let currentNodeId = null;
        let currentPromptType = 'systemPrompt';
        let editingNodeId = null;
        let githubToken = localStorage.getItem('githubToken') || '';

        // 初始化
        async function init() {
            await loadData();
            renderNodeList();
        }

        // 从 GitHub 加载数据
        async function loadData() {
            try {
                showToast('正在从 GitHub 加载数据...', 'info');
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/${GITHUB_CONFIG.path}?t=${Date.now()}`);
                if (response.ok) {
                    const data = await response.json();
                    nodes = data.nodes || [];
                    showToast('数据加载成功', 'success');
                } else {
                    // 如果文件不存在，使用默认数据
                    nodes = getDefaultData();
                    showToast('使用默认数据', 'info');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                nodes = getDefaultData();
                showToast('加载失败，使用本地数据', 'error');
            }
        }

        // 获取默认数据
        function getDefaultData() {
            return [
                {
                    id: '1',
                    name: '意图识别节点',
                    systemPrompt: {
                        current: { version: 1, content: '你是一位杰出的意图识别专家，具备极为敏锐的洞察力，能够迅速且精准地判断用户问题的意图类型。', timestamp: Date.now() },
                        preview: null,
                        history: []
                    },
                    userPrompt: {
                        current: { version: 1, content: '请识别以下用户意图，仅返回对应的序号。', timestamp: Date.now() },
                        preview: null,
                        history: []
                    }
                },
                {
                    id: '2',
                    name: '商品知识检索',
                    systemPrompt: {
                        current: { version: 1, content: '你是商品知识专家，熟悉所有保健品的功效、成分、适用人群等信息。', timestamp: Date.now() },
                        preview: null,
                        history: []
                    },
                    userPrompt: {
                        current: { version: 1, content: '请检索以下商品信息并给出准确的回答。', timestamp: Date.now() },
                        preview: null,
                        history: []
                    }
                }
            ];
        }

        // 检查并获取 GitHub Token
        async function ensureGitHubToken() {
            if (githubToken) return true;
            
            const token = prompt('首次使用需要配置 GitHub Token\n\n用于保存数据到仓库，Token 只需输入一次后会自动记住。\n\n获取方式：GitHub → Settings → Developer settings → Personal access tokens → Generate new token（勾选 repo 权限）');
            if (!token) {
                showToast('未提供 Token，无法保存到 GitHub', 'error');
                return false;
            }
            githubToken = token;
            localStorage.setItem('githubToken', token);
            showToast('Token 已保存，下次无需重复输入', 'success');
            return true;
        }

        // 保存数据到 GitHub
        async function saveDataToGitHub() {
            const hasToken = await ensureGitHubToken();
            if (!hasToken) return false;

            try {
                showToast('正在保存到 GitHub...', 'info');

                // 先获取文件的 SHA（如果存在）
                let sha = null;
                const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?ref=${GITHUB_CONFIG.branch}`, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (getResponse.status === 401) {
                    // Token 无效或过期
                    showToast('Token 无效或已过期，请重新配置', 'error');
                    githubToken = '';
                    localStorage.removeItem('githubToken');
                    return await saveDataToGitHub(); // 递归调用，会重新提示输入 Token
                }
                
                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                }

                // 准备提交数据
                const content = btoa(unescape(encodeURIComponent(JSON.stringify({ nodes }, null, 2))));
                const body = {
                    message: `Update prompt data: ${new Date().toLocaleString('zh-CN')}`,
                    content: content,
                    branch: GITHUB_CONFIG.branch
                };
                if (sha) {
                    body.sha = sha;
                }

                // 提交到 GitHub
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    showToast('数据已保存到 GitHub', 'success');
                    return true;
                } else if (response.status === 401) {
                    showToast('Token 无效或已过期，请重新配置', 'error');
                    githubToken = '';
                    localStorage.removeItem('githubToken');
                    return false;
                } else {
                    const error = await response.json();
                    throw new Error(error.message || '保存失败');
                }
            } catch (error) {
                console.error('保存到 GitHub 失败:', error);
                showToast('保存失败: ' + error.message, 'error');
                return false;
            }
        }

        // 渲染节点列表
        function renderNodeList() {
            const list = document.getElementById('nodeList');
            list.innerHTML = nodes.map(node => `
                <li class="node-item ${node.id === currentNodeId ? 'active' : ''}" onclick="selectNode('${node.id}')">
                    <span class="node-name">${node.name}</span>
                    <div class="node-actions" onclick="event.stopPropagation()">
                        <button class="btn-icon" onclick="editNode('${node.id}')" title="编辑">✏️</button>
                        <button class="btn-icon" onclick="deleteNode('${node.id}')" title="删除">🗑️</button>
                    </div>
                </li>
            `).join('');
        }

        // 选择节点
        function selectNode(nodeId) {
            currentNodeId = nodeId;
            renderNodeList();
            renderMainContent();
        }

        // 渲染主内容区
        function renderMainContent() {
            const node = nodes.find(n => n.id === currentNodeId);
            if (!node) return;

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="node-header">
                    <h2>${node.name}</h2>
                </div>
                <div class="version-tabs">
                    <button class="version-tab ${currentPromptType === 'systemPrompt' ? 'active' : ''}" onclick="switchPromptType('systemPrompt')">
                        系统提示词
                        ${node.systemPrompt.preview ? '<span class="version-badge badge-preview">有更新</span>' : ''}
                    </button>
                    <button class="version-tab ${currentPromptType === 'userPrompt' ? 'active' : ''}" onclick="switchPromptType('userPrompt')">
                        用户提示词
                        ${node.userPrompt.preview ? '<span class="version-badge badge-preview">有更新</span>' : ''}
                    </button>
                </div>
                ${renderPromptEditor(node)}
            `;
        }

        // 渲染提示词编辑器
        function renderPromptEditor(node) {
            const prompt = node[currentPromptType];
            const hasPreview = prompt.preview !== null;
            const currentVersion = prompt.current;
            const previewVersion = prompt.preview;

            return `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <div class="prompt-section">
                            <h3>现有版本 <span class="version-badge badge-current">v${currentVersion.version}</span></h3>
                            <textarea class="prompt-editor" id="currentEditor" readonly>${currentVersion.content}</textarea>
                        </div>
                        <div class="actions-bar">
                            <button class="btn btn-warning" onclick="rollbackVersion()" ${prompt.history.length === 0 ? 'disabled' : ''}>
                                ↩️ 回滚到上一版本
                            </button>
                        </div>
                    </div>
                    <div>
                        <div class="prompt-section">
                            <h3>预更新版本 ${hasPreview ? `<span class="version-badge badge-preview">v${previewVersion.version}</span>` : '<span class="version-badge badge-preview">未创建</span>'}</h3>
                            <textarea class="prompt-editor" id="previewEditor" ${!hasPreview ? 'placeholder="点击编辑创建预更新版本..."' : ''}>${hasPreview ? previewVersion.content : ''}</textarea>
                        </div>
                        <div class="actions-bar">
                            <button class="btn btn-primary" onclick="savePreview()">
                                💾 保存预更新
                            </button>
                            <button class="btn btn-success" onclick="publishPreview()" ${!hasPreview ? 'disabled' : ''}>
                                🚀 发布为现有版本
                            </button>
                            <button class="btn btn-secondary" onclick="showDiff()" ${!hasPreview ? 'disabled' : ''}>
                                🔍 对比差异
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 切换提示词类型
        function switchPromptType(type) {
            currentPromptType = type;
            renderMainContent();
        }

        // 显示新增节点模态框
        function showAddNodeModal() {
            editingNodeId = null;
            document.getElementById('nodeModalTitle').textContent = '新增节点';
            document.getElementById('nodeNameInput').value = '';
            showModal('nodeModal');
        }

        // 编辑节点
        function editNode(nodeId) {
            editingNodeId = nodeId;
            const node = nodes.find(n => n.id === nodeId);
            document.getElementById('nodeModalTitle').textContent = '编辑节点';
            document.getElementById('nodeNameInput').value = node.name;
            showModal('nodeModal');
        }

        // 保存节点
        async function saveNode() {
            const name = document.getElementById('nodeNameInput').value.trim();
            if (!name) {
                showToast('请输入节点名称', 'error');
                return;
            }

            if (editingNodeId) {
                const node = nodes.find(n => n.id === editingNodeId);
                node.name = name;
                showToast('节点更新成功', 'success');
            } else {
                const newNode = {
                    id: Date.now().toString(),
                    name: name,
                    systemPrompt: {
                        current: { version: 1, content: '', timestamp: Date.now() },
                        preview: null,
                        history: []
                    },
                    userPrompt: {
                        current: { version: 1, content: '', timestamp: Date.now() },
                        preview: null,
                        history: []
                    }
                };
                nodes.push(newNode);
                currentNodeId = newNode.id;
                showToast('节点创建成功', 'success');
            }

            await saveDataToGitHub();
            closeModal('nodeModal');
            renderNodeList();
            renderMainContent();
        }

        // 删除节点
        async function deleteNode(nodeId) {
            if (!confirm('确定要删除这个节点吗？')) return;
            nodes = nodes.filter(n => n.id !== nodeId);
            if (currentNodeId === nodeId) {
                currentNodeId = nodes.length > 0 ? nodes[0].id : null;
            }
            await saveDataToGitHub();
            renderNodeList();
            if (currentNodeId) {
                renderMainContent();
            } else {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>请选择一个工作流节点查看或编辑提示词</p>
                    </div>
                `;
            }
            showToast('节点已删除', 'success');
        }

        // 保存预更新版本
        async function savePreview() {
            const node = nodes.find(n => n.id === currentNodeId);
            const content = document.getElementById('previewEditor').value;
            const prompt = node[currentPromptType];

            if (!prompt.preview) {
                prompt.preview = {
                    version: prompt.current.version + 1,
                    content: content,
                    timestamp: Date.now()
                };
            } else {
                prompt.preview.content = content;
                prompt.preview.timestamp = Date.now();
            }

            await saveDataToGitHub();
            renderMainContent();
            renderNodeList();
            showToast('预更新版本已保存', 'success');
        }

        // 发布预更新版本
        async function publishPreview() {
            const node = nodes.find(n => n.id === currentNodeId);
            const prompt = node[currentPromptType];

            if (!prompt.preview) {
                showToast('没有预更新版本可发布', 'error');
                return;
            }

            // 将当前版本移入历史
            prompt.history.push({ ...prompt.current });

            // 预更新版本变为当前版本
            prompt.current = { ...prompt.preview };
            prompt.preview = null;

            await saveDataToGitHub();
            renderMainContent();
            renderNodeList();
            showToast('预更新版本已发布为现有版本', 'success');
        }

        // 回滚版本
        async function rollbackVersion() {
            const node = nodes.find(n => n.id === currentNodeId);
            const prompt = node[currentPromptType];

            if (prompt.history.length === 0) {
                showToast('没有找到上一版本提示词', 'error');
                return;
            }

            if (!confirm('确定要回滚到上一版本吗？当前版本将被丢弃。')) return;

            // 将当前版本移入预更新（如果有内容）
            if (prompt.current.content) {
                prompt.preview = { ...prompt.current };
            }

            // 从历史中恢复上一版本
            const previousVersion = prompt.history.pop();
            prompt.current = previousVersion;

            await saveDataToGitHub();
            renderMainContent();
            renderNodeList();
            showToast('已回滚到上一版本', 'success');
        }

        // 显示差异对比
        function showDiff() {
            const node = nodes.find(n => n.id === currentNodeId);
            const prompt = node[currentPromptType];

            if (!prompt.preview) {
                showToast('没有预更新版本可对比', 'error');
                return;
            }

            const current = prompt.current.content;
            const preview = prompt.preview.content;

            document.getElementById('diffCurrent').innerHTML = highlightDiff(current, preview, 'current');
            document.getElementById('diffPreview').innerHTML = highlightDiff(preview, current, 'preview');
            showModal('diffModal');
        }

        // 高亮差异
        function highlightDiff(text1, text2, type) {
            const lines1 = text1.split('\n');
            const lines2 = text2.split('\n');
            let result = '';

            const maxLen = Math.max(lines1.length, lines2.length);
            for (let i = 0; i < maxLen; i++) {
                const line1 = lines1[i] || '';
                const line2 = lines2[i] || '';

                if (line1 === line2) {
                    result += escapeHtml(line1) + '\n';
                } else {
                    if (type === 'current') {
                        result += `<span class="diff-removed">${escapeHtml(line1)}</span>\n`;
                    } else {
                        result += `<span class="diff-added">${escapeHtml(line2)}</span>\n`;
                    }
                }
            }

            return result;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 模态框控制
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // Toast提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 清除 GitHub Token
        function clearToken() {
            githubToken = '';
            localStorage.removeItem('githubToken');
            showToast('Token 已清除', 'info');
        }

        // 点击模态框外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                }
            });
        });

        // 初始化
        init();
    </script>
</body>
</html>
