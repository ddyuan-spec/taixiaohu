<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰尔平台端 - 反馈管理</title>
  <style>
    /* ========== 基础变量 ========== */
    :root {
      --primary: #7B4DFF;
      --primary-light: #EDE7F6;
      --primary-hover: #6A3DE8;
      --bg: #F5F6FA;
      --sidebar-bg: #FFFFFF;
      --card-bg: #FFFFFF;
      --text: #1A1A2E;
      --text-secondary: #8B8FA3;
      --text-muted: #A0A4B8;
      --border: #E8EAF0;
      --border-light: #F0F1F5;
      --success: #52C41A;
      --danger: #FF4D4F;
      --warning: #FAAD14;
      --info: #1890FF;
      --radius: 8px;
      --radius-sm: 4px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ========== 顶部导航栏 ========== */
    .top-header {
      height: 56px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .top-header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .top-header .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .top-header .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,0.85);
    }

    .top-header .header-right .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
      border: none;
    }

    .top-header .header-right .icon-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ========== 左侧边栏 ========== */
    .sidebar {
      width: 200px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 56px;
      left: 0;
      bottom: 0;
      z-index: 90;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu li {
      padding: 0 12px;
      margin-bottom: 2px;
    }

    .sidebar-menu li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .sidebar-menu li a:hover {
      background: var(--bg);
      color: var(--text);
    }

    .sidebar-menu li a.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 500;
    }

    .sidebar-menu li a .menu-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border-light);
      margin: 8px 16px;
    }

    .sidebar-section-title {
      padding: 8px 24px 4px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ========== 主内容区 ========== */
    .main-content {
      margin-left: 200px;
      margin-top: 56px;
      padding: 20px 24px;
      min-height: calc(100vh - 56px);
    }

    /* ========== 面包屑导航 ========== */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .breadcrumb a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: var(--primary);
    }

    .breadcrumb .current {
      color: var(--text);
      font-weight: 500;
    }

    .breadcrumb .sep {
      color: var(--text-muted);
    }

    /* ========== 页面标题区 ========== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    /* ========== 筛选栏 ========== */
    .filter-bar {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-bar .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-bar .filter-label {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .filter-bar input[type="text"],
    .filter-bar select {
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
      min-width: 140px;
    }

    .filter-bar input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .filter-bar input[type="text"]:focus,
    .filter-bar select:focus {
      border-color: var(--primary);
    }

    .filter-bar .btn {
      height: 32px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .filter-bar .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .filter-bar .btn-primary:hover {
      background: var(--primary-hover);
    }

    .filter-bar .btn-default {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filter-bar .btn-default:hover {
      background: var(--bg);
    }

    /* ========== 数据表格 ========== */
    .data-table-wrapper {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead th {
      background: #FAFBFC;
      color: var(--text-secondary);
      font-weight: 500;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .data-table tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text);
      vertical-align: top;
    }

    .data-table tbody tr:hover {
      background: #FAFBFC;
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* 消息ID列 */
    .data-table .col-message {
      width: 140px;
    }

    .message-id {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      background: var(--bg);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      display: inline-block;
    }

    /* 联系方式列 */
    .data-table .col-contact {
      width: 120px;
    }

    .contact-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .contact-text.empty {
      color: var(--text-muted);
      font-style: italic;
    }

    /* 备注列 */
    .data-table .col-remark {
      width: 100px;
    }

    .remark-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .remark-text.empty {
      color: var(--text-muted);
      font-style: italic;
    }

    /* 时间列 */
    .data-table .col-time {
      width: 150px;
      white-space: nowrap;
    }

    .time-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
    }

    /* 表格横向滚动 */
    .data-table-scroll {
      overflow-x: auto;
      max-width: 100%;
    }

    .data-table-scroll .data-table {
      min-width: 1300px;
    }

    /* 会话ID列 */
    .data-table .col-session {
      width: 140px;
    }

    .session-id {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      background: var(--bg);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      display: inline-block;
      cursor: pointer;
      transition: all 0.2s;
    }

    .session-id:hover {
      color: var(--primary);
      background: var(--primary-light);
    }

    /* 对话记录列 */
    .data-table .col-dialogue {
      max-width: 280px;
    }

    .dialogue-preview {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dialogue-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .dialogue-item .dialogue-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      color: #fff;
    }

    .dialogue-item .dialogue-avatar.user {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }

    .dialogue-item .dialogue-avatar.ai {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .dialogue-item .dialogue-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .dialogue-item .dialogue-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* 反馈结果列 */
    .data-table .col-result {
      width: 100px;
      text-align: center;
    }

    .feedback-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .feedback-tag.like {
      background: #F6FFED;
      color: var(--success);
      border: 1px solid #B7EB8F;
    }

    .feedback-tag.dislike {
      background: #FFF2F0;
      color: var(--danger);
      border: 1px solid #FFCCC7;
    }

    /* 理由列 */
    .data-table .col-reason {
      max-width: 200px;
    }

    .reason-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .reason-text.empty {
      color: var(--text-muted);
      font-style: italic;
    }

    /* 操作列 */
    .data-table .col-action {
      width: 100px;
      text-align: center;
    }

    .action-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--bg);
      color: var(--primary);
    }

    /* ========== 分页 ========== */
    .pagination-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .pagination-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pagination-info select {
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 6px;
      font-size: 12px;
      background: #fff;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .pagination button {
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .pagination button:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }

    .pagination button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .pagination button:disabled {
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* ========== 详情弹窗 ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: var(--card-bg);
      border-radius: var(--radius);
      width: 720px;
      max-width: 90vw;
      max-height: 85vh;
      overflow: hidden;
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .modal-close:hover {
      background: var(--border);
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      max-height: calc(85vh - 60px);
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section:last-child {
      margin-bottom: 0;
    }

    .detail-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }

    .detail-content {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
    }

    .detail-dialogue {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-dialogue-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .detail-dialogue-item .d-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      color: #fff;
    }

    .detail-dialogue-item .d-avatar.user {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }

    .detail-dialogue-item .d-avatar.ai {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .detail-dialogue-item .d-content {
      flex: 1;
      background: #fff;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid var(--border-light);
    }

    .detail-dialogue-item.user-row {
      flex-direction: row-reverse;
    }

    .detail-dialogue-item.user-row .d-content {
      background: var(--primary);
      color: #fff;
      border: none;
    }

    .detail-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .detail-meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-meta-item .meta-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .detail-meta-item .meta-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    /* ========== 空状态 ========== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 1200px) {
      .data-table .col-dialogue {
        max-width: 200px;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .main-content {
        margin-left: 0;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .filter-bar .filter-group {
        width: 100%;
      }
      .filter-bar input[type="text"],
      .filter-bar select {
        flex: 1;
      }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="top-header">
    <div class="logo">
      <div class="logo-icon">泰</div>
      <span>泰尔平台端</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" title="通知">&#128276;</button>
      <button class="icon-btn" title="设置">&#9881;</button>
    </div>
  </header>

  <!-- 左侧边栏 -->
  <aside class="sidebar">
    <ul class="sidebar-menu">
      <li><a><span class="menu-icon">&#127968;</span>首页</a></li>
      <li><a><span class="menu-icon">&#128200;</span>数据看板</a></li>
    </ul>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-title">健康管理</div>
    <ul class="sidebar-menu">
      <li><a><span class="menu-icon">&#128100;</span>用户管理</a></li>
      <li><a><span class="menu-icon">&#128203;</span>档案管理</a></li>
      <li><a><span class="menu-icon">&#128196;</span>健康报告</a></li>
      <li><a><span class="menu-icon">&#128172;</span>对话记录</a></li>
    </ul>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-title">运营管理</div>
    <ul class="sidebar-menu">
      <li><a><span class="menu-icon">&#128188;</span>内容管理</a></li>
      <li><a><span class="menu-icon">&#127942;</span>活动管理</a></li>
      <li><a class="active"><span class="menu-icon">&#128172;</span>反馈管理</a></li>
    </ul>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-title">系统设置</div>
    <ul class="sidebar-menu">
      <li><a><span class="menu-icon">&#9881;</span>系统配置</a></li>
      <li><a><span class="menu-icon">&#128101;</span>权限管理</a></li>
      <li><a><span class="menu-icon">&#128196;</span>日志管理</a></li>
    </ul>
  </aside>

  <!-- 主内容 -->
  <main class="main-content">
    <!-- 面包屑 -->
    <nav class="breadcrumb">
      <a href="#">首页</a>
      <span class="sep">/</span>
      <a href="#">运营管理</a>
      <span class="sep">/</span>
      <span class="current">反馈管理</span>
    </nav>

    <!-- 页面标题 -->
    <div class="page-header">
      <h1>AI对话反馈管理</h1>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">会话ID：</span>
        <input type="text" id="filterSessionId" placeholder="请输入会话ID" oninput="applyFilter()">
      </div>
      <div class="filter-group">
        <span class="filter-label">反馈结果：</span>
        <select id="filterResult" onchange="applyFilter()">
          <option value="">全部</option>
          <option value="like">好评</option>
          <option value="dislike">差评</option>
        </select>
      </div>
      <div class="filter-group" style="margin-left: auto;">
        <button class="btn btn-primary" onclick="applyFilter()">&#128269; 搜索</button>
        <button class="btn btn-default" onclick="resetFilter()">&#8634; 重置</button>

    // ========== 渲染分页 ==========
    function renderPagination() {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      const pagination = document.getElementById('pagination');

      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';

      // 上一页
      html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">&lt;</button>`;

      // 页码
      const maxVisible = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);

      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }

      if (startPage > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<button disabled>...</button>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<button disabled>...</button>`;
        html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      // 下一页
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">&gt;</button>`;

      pagination.innerHTML = html;
    }

    // ========== 分页跳转 ==========
    function goToPage(page) {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      renderTable();
    }

    // ========== 筛选功能 ==========
    function applyFilter() {
      const sessionIdFilter = document.getElementById('filterSessionId').value.toLowerCase();
      const resultFilter = document.getElementById('filterResult').value;

      filteredData = feedbackData.filter(item => {
        // 会话ID筛选
        if (sessionIdFilter) {
          if (!item.sessionId.toLowerCase().includes(sessionIdFilter)) return false;
        }

        // 结果筛选
        if (resultFilter && item.result !== resultFilter) return false;

        return true;
      });

      currentPage = 1;
      renderTable();
    }

    function resetFilter() {
      document.getElementById('filterSessionId').value = '';
      document.getElementById('filterResult').value = '';
      filteredData = [...feedbackData];
      currentPage = 1;
      renderTable();
    }

            </div>
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('detailModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('detailModal').classList.remove('active');
    }

    // ========== 删除 ==========
    function deleteItem(id) {
      if (!confirm('确定要删除这条反馈记录吗？')) return;
      const index = feedbackData.findIndex(d => d.id === id);
      if (index > -1) {
        feedbackData.splice(index, 1);
        applyFilter();
      }
    }

    // ========== 工具函数 ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 复制会话ID ==========
    function copySessionId(sid) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(sid).then(function() {
          showToast('会话ID已复制：' + sid);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = sid;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('会话ID已复制：' + sid);
      }
    }

    // ========== Toast提示 ==========
    function showToast(msg) {
      var existing = document.getElementById('sessionToast');
      if (existing) existing.remove();
      var toast = document.createElement('div');
      toast.id = 'sessionToast';
      toast.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(5,150,105,0.95);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.15);transition:opacity 0.3s;opacity:0;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      requestAnimationFrame(function() { toast.style.opacity = '1'; });
      setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 300);
      }, 2000);
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderTable();
    });

    // ESC关闭弹窗
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
