<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 模型调用记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            background: rgba(67,233,123,0.2);
            border-left: 3px solid #43e97b;
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .content-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card .card-header {
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            padding: 16px 20px;
        }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s;
            color: #fff;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.85rem; opacity: 0.85; }
        .call-row {
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .call-row:hover { background: #f6ffed; }
        .call-row:last-child { border-bottom: none; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.success { background: #43e97b; }
        .status-dot.error { background: #ff6b6b; }
        .status-dot.timeout { background: #fa8c16; }
        .module-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .detail-modal .modal-dialog { max-width: 800px; }
        .json-preview {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 p-0 sidebar">
                <div class="brand">
                    <i class="bi bi-shield-check"></i> 泰小虎后台管理
                </div>
                <nav class="nav flex-column">
                    <a href="/admin" class="nav-link">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a href="/admin/conversations" class="nav-link">
                        <i class="bi bi-chat-square-text"></i> 对话记录
                    </a>
                    <a href="/admin/knowledge/chunks" class="nav-link">
                        <i class="bi bi-database"></i> 知识切片
                    </a>
                    <a href="/admin/profiles" class="nav-link">
                        <i class="bi bi-person-badge"></i> 用户画像
                    </a>
                    <a href="/admin/llm" class="nav-link">
                        <i class="bi bi-cpu"></i> 模型配置
                    </a>
                    <a href="/admin/prompt" class="nav-link">
                        <i class="bi bi-chat-left-text"></i> 提示词配置
                    </a>
                    <a href="/admin/badcases" class="nav-link">
                        <i class="bi bi-bug"></i> Badcase管理
                    </a>
                    <a href="/admin/model-calls" class="nav-link active">
                        <i class="bi bi-activity"></i> 模型调用
                    </a>
                    <a href="/admin/traces" class="nav-link">
                        <i class="bi bi-diagram-3"></i> 调用链路
                    </a>
                    <a href="/admin/points" class="nav-link">
                        <i class="bi bi-coin"></i> 积分管理
                    </a>
                    <a href="/admin/points/config" class="nav-link">
                        <i class="bi bi-sliders"></i> 积分配置
                    </a>
                    <a href="/admin/shop" class="nav-link">
                        <i class="bi bi-shop"></i> 积分商城
                    </a>
                    <a href="/admin/data-export" class="nav-link">
                        <i class="bi bi-download"></i> 数据导出
                    </a>
                    <a href="/" class="nav-link">
                        <i class="bi bi-chat-dots"></i> 返回前台
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0"><i class="bi bi-activity me-2"></i>模型调用记录</h4>
                    <button class="btn btn-outline-success btn-sm" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise me-1"></i>刷新
                    </button>
                </div>

                <!-- 统计卡片 -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                            <div class="card-body">
                                <div class="stat-label mb-1">今日Token消耗</div>
                                <div class="stat-value" id="todayTokens">0</div>
                                <div class="mt-1" style="font-size:0.75rem;opacity:0.8;">
                                    <i class="bi bi-arrow-up"></i> <span id="tokenTrend">-</span> 较昨日
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                            <div class="card-body">
                                <div class="stat-label mb-1">今日调用次数</div>
                                <div class="stat-value" id="todayCalls">0</div>
                                <div class="mt-1" style="font-size:0.75rem;opacity:0.8;">
                                    <i class="bi bi-arrow-up"></i> <span id="callTrend">-</span> 较昨日
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card" style="background: linear-gradient(135deg, #fa709a, #fee140);">
                            <div class="card-body">
                                <div class="stat-label mb-1">平均响应时间</div>
                                <div class="stat-value"><span id="avgTime">0</span><small style="font-size:1rem;">ms</small></div>
                                <div class="mt-1" style="font-size:0.75rem;opacity:0.8;">
                                    <i class="bi bi-arrow-down"></i> <span id="timeTrend">-</span> 较昨日
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);">
                            <div class="card-body">
                                <div class="stat-label mb-1">预估成本</div>
                                <div class="stat-value">$<span id="todayCost">0</span></div>
                                <div class="mt-1" style="font-size:0.75rem;opacity:0.8;">今日累计</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 筛选栏 -->
                <div class="card content-card mb-3">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterModel" onchange="filterCalls()">
                                    <option value="all">全部模型</option>
                                    <option value="gpt-4">GPT-4</option>
                                    <option value="gpt-3.5">GPT-3.5</option>
                                    <option value="qwen">通义千问</option>
                                    <option value="deepseek">DeepSeek</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterModule" onchange="filterCalls()">
                                    <option value="all">全部模块</option>
                                    <option value="intent_recognizer">意图识别</option>
                                    <option value="profile_collector">画像收集</option>
                                    <option value="symptom_collector">症状收集</option>
                                    <option value="product_recommender">产品推荐</option>
                                    <option value="dialogue_manager">对话管理</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterStatus" onchange="filterCalls()">
                                    <option value="all">全部状态</option>
                                    <option value="success">成功</option>
                                    <option value="error">失败</option>
                                    <option value="timeout">超时</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-success btn-sm w-100" onclick="loadModelCalls()">
                                    <i class="bi bi-search me-1"></i>查询
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 调用记录列表 -->
                <div class="card content-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-ul me-2"></i>调用记录</span>
                        <small class="text-muted" id="callCount">共 0 条</small>
                    </div>
                    <div id="callList">
                        <div class="empty-state">
                            <i class="bi bi-activity" style="font-size:48px;color:#ccc;"></i>
                            <p class="mt-3">暂无调用记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情Modal -->
    <div class="modal fade detail-modal" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-eye me-2"></i>调用详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 动态渲染 -->
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allCalls = [];
        let modalInstance = null;

        document.addEventListener('DOMContentLoaded', function() {
            modalInstance = new bootstrap.Modal(document.getElementById('detailModal'));
            loadModelCalls();
            loadStats();
        });

        async function loadModelCalls() {
            try {
                const resp = await fetch('/api/admin/model-calls?limit=100');
                const data = await resp.json();
                if (data.success) {
                    allCalls = data.calls || [];
                    filterCalls();
                }
            } catch (e) {
                console.error('加载调用记录失败:', e);
                showToast('加载失败', 'error');
            }
        }

        async function loadStats() {
            try {
                const resp = await fetch('/api/admin/model-calls/stats');
                const data = await resp.json();
                if (data.success) {
                    const s = data.stats || {};
                    document.getElementById('todayTokens').textContent = (s.today_tokens || 0).toLocaleString();
                    document.getElementById('todayCalls').textContent = (s.today_calls || 0).toLocaleString();
                    document.getElementById('avgTime').textContent = s.avg_response_time_ms || 0;
                    document.getElementById('todayCost').textContent = (s.today_cost_usd || 0).toFixed(2);
                    document.getElementById('tokenTrend').textContent = (s.token_trend || 0) + '%';
                    document.getElementById('callTrend').textContent = (s.call_trend || 0) + '%';
                    document.getElementById('timeTrend').textContent = (s.time_trend || 0) + '%';
                }
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        function filterCalls() {
            const model = document.getElementById('filterModel').value;
            const module = document.getElementById('filterModule').value;
            const status = document.getElementById('filterStatus').value;

            const filtered = allCalls.filter(c => {
                if (model !== 'all' && !(c.model_name || '').toLowerCase().includes(model)) return false;
                if (module !== 'all' && c.module_type !== module) return false;
                if (status !== 'all' && c.status !== status) return false;
                return true;
            });
            renderCalls(filtered);
        }

        function renderCalls(calls) {
            const container = document.getElementById('callList');
            document.getElementById('callCount').textContent = `共 ${calls.length} 条`;

            if (calls.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="bi bi-activity" style="font-size:48px;color:#ccc;"></i>
                    <p class="mt-3">暂无调用记录</p>
                </div>`;
                return;
            }

            const moduleMap = {
                'intent_recognizer': '意图识别',
                'profile_collector': '画像收集',
                'symptom_collector': '症状收集',
                'product_recommender': '产品推荐',
                'dialogue_manager': '对话管理'
            };
            const moduleColors = {
                'intent_recognizer': 'bg-primary bg-opacity-10 text-primary',
                'profile_collector': 'bg-success bg-opacity-10 text-success',
                'symptom_collector': 'bg-warning bg-opacity-10 text-warning',
                'product_recommender': 'bg-danger bg-opacity-10 text-danger',
                'dialogue_manager': 'bg-info bg-opacity-10 text-info'
            };

            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-hover mb-0" style="font-size:0.85rem;">
                        <thead class="table-light">
                            <tr>
                                <th>时间</th>
                                <th>模型</th>
                                <th>模块</th>
                                <th class="text-end">Input</th>
                                <th class="text-end">Output</th>
                                <th class="text-end">耗时</th>
                                <th class="text-center">状态</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${calls.map(c => {
                                const mod = moduleMap[c.module_type] || c.module_type;
                                const modCls = moduleColors[c.module_type] || 'bg-secondary bg-opacity-10 text-secondary';
                                let statusIcon = '<span class="status-dot success"></span>';
                                if (c.status === 'error') statusIcon = '<span class="status-dot error"></span>';
                                if (c.status === 'timeout') statusIcon = '<span class="status-dot timeout"></span>';
                                return `
                                <tr style="cursor:pointer;" onclick="showDetail('${c.call_id}')">
                                    <td style="white-space:nowrap;">${formatTime(c.created_at)}</td>
                                    <td><span class="badge bg-light text-dark">${c.model_name || '-'}</span></td>
                                    <td><span class="module-badge ${modCls}">${mod}</span></td>
                                    <td class="text-end">${(c.prompt_tokens || 0).toLocaleString()}</td>
                                    <td class="text-end">${(c.completion_tokens || 0).toLocaleString()}</td>
                                    <td class="text-end">${c.response_time_ms || 0}ms</td>
                                    <td class="text-center">${statusIcon} ${c.status || 'success'}</td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation();showDetail('${c.call_id}')">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        async function showDetail(callId) {
            try {
                const resp = await fetch(`/api/admin/model-calls/${callId}`);
                const data = await resp.json();
                if (data.success && data.call) {
                    const c = data.call;
                    const body = document.getElementById('modalBody');
                    body.innerHTML = `
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">Call ID</label>
                                <div class="fw-bold" style="font-size:0.85rem;">${c.call_id}</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">模型</label>
                                <div class="fw-bold">${c.model_name || '-'}</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">模块</label>
                                <div class="fw-bold">${c.module_type || '-'}</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">状态</label>
                                <div class="fw-bold ${c.status === 'success' ? 'text-success' : 'text-danger'}">${c.status || 'success'}</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted" style="font-size:0.8rem;">Prompt Tokens</label>
                                <div class="fw-bold">${c.prompt_tokens || 0}</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted" style="font-size:0.8rem;">Completion Tokens</label>
                                <div class="fw-bold">${c.completion_tokens || 0}</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-muted" style="font-size:0.8rem;">总 Tokens</label>
                                <div class="fw-bold">${c.total_tokens || 0}</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">响应时间</label>
                                <div class="fw-bold">${c.response_time_ms || 0}ms</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted" style="font-size:0.8rem;">预估成本</label>
                                <div class="fw-bold">$${(c.cost_usd || 0).toFixed(4)}</div>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted" style="font-size:0.8rem;">会话ID</label>
                                <div class="fw-bold" style="font-size:0.85rem;">
                                    <a href="/admin/conversations" target="_blank">${c.session_id || '-'}</a>
                                </div>
                            </div>
                            ${c.error_message ? `
                            <div class="col-12">
                                <label class="form-label text-danger" style="font-size:0.8rem;">错误信息</label>
                                <div class="text-danger" style="font-size:0.85rem;">${escapeHtml(c.error_message)}</div>
                            </div>` : ''}
                            ${c.prompt ? `
                            <div class="col-12">
                                <label class="form-label text-muted" style="font-size:0.8rem;">Prompt 内容</label>
                                <div class="json-preview">${escapeHtml(c.prompt)}</div>
                            </div>` : ''}
                            ${c.response ? `
                            <div class="col-12">
                                <label class="form-label text-muted" style="font-size:0.8rem;">Response 内容</label>
                                <div class="json-preview">${escapeHtml(c.response)}</div>
                            </div>` : ''}
                        </div>
                    `;
                    modalInstance.show();
                }
            } catch (e) {
                showToast('加载详情失败', 'error');
            }
        }

        function refreshData() {
            loadModelCalls();
            loadStats();
            showToast('数据已刷新');
        }

        function formatTime(iso) {
            if (!iso) return '-';
            try {
                const d = new Date(iso);
                return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
            } catch(e) { return iso; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(msg, type='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast show ${type==='success'?'bg-success':'bg-danger'} text-white`;
            t.innerHTML = `<div class="toast-body">${msg}</div>`;
            t.style.minWidth = '200px';
            c.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
        }
    </script>
</body>
</html>
