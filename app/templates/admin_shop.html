<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 积分商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            background: rgba(67,233,123,0.2);
            border-left: 3px solid #43e97b;
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .content-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card .card-header {
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            padding: 16px 20px;
        }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; }
        .stat-card .stat-label { color: #6c757d; font-size: 0.85rem; }
        .product-card {
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
            background: #fff;
        }
        .product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .product-img {
            height: 120px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            color: #fff;
        }
        .product-type-badge {
            position: absolute;
            top: 8px; right: 8px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 p-0 sidebar">
                <div class="brand">
                    <i class="bi bi-shield-check"></i> 泰小虎后台管理
                </div>
                <nav class="nav flex-column">
                    <a href="/admin" class="nav-link">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a href="/admin/conversations" class="nav-link">
                        <i class="bi bi-chat-square-text"></i> 对话记录
                    </a>
                    <a href="/admin/knowledge/chunks" class="nav-link">
                        <i class="bi bi-database"></i> 知识切片
                    </a>
                    <a href="/admin/profiles" class="nav-link">
                        <i class="bi bi-person-badge"></i> 用户画像
                    </a>
                    <a href="/admin/llm" class="nav-link">
                        <i class="bi bi-cpu"></i> 模型配置
                    </a>
                    <a href="/admin/prompt" class="nav-link">
                        <i class="bi bi-chat-left-text"></i> 提示词配置
                    </a>
                    <a href="/admin/badcases" class="nav-link">
                        <i class="bi bi-bug"></i> Badcase管理
                    </a>
                    <a href="/admin/model-calls" class="nav-link">
                        <i class="bi bi-activity"></i> 模型调用
                    </a>
                    <a href="/admin/traces" class="nav-link">
                        <i class="bi bi-diagram-3"></i> 调用链路
                    </a>
                    <a href="/admin/points" class="nav-link">
                        <i class="bi bi-coin"></i> 积分管理
                    </a>
                    <a href="/admin/points/config" class="nav-link">
                        <i class="bi bi-sliders"></i> 积分配置
                    </a>
                    <a href="/admin/shop" class="nav-link active">
                        <i class="bi bi-shop"></i> 积分商城
                    </a>
                    <a href="/admin/data-export" class="nav-link">
                        <i class="bi bi-download"></i> 数据导出
                    </a>
                    <a href="/" class="nav-link">
                        <i class="bi bi-chat-dots"></i> 返回前台
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0"><i class="bi bi-shop me-2"></i>积分商城</h4>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-success btn-sm" onclick="refreshData()">
                            <i class="bi bi-arrow-clockwise me-1"></i>刷新
                        </button>
                        <button class="btn btn-primary btn-sm" onclick="showProductModal()">
                            <i class="bi bi-plus-lg me-1"></i>添加商品
                        </button>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex align-items-center">
                                    <div class="stat-icon bg-primary bg-opacity-10 text-primary me-3">
                                        <i class="bi bi-box-seam"></i>
                                    </div>
                                    <div>
                                        <div class="stat-value" id="totalProducts">0</div>
                                        <div class="stat-label">商品总数</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex align-items-center">
                                    <div class="stat-icon bg-success bg-opacity-10 text-success me-3">
                                        <i class="bi bi-check-circle"></i>
                                    </div>
                                    <div>
                                        <div class="stat-value" id="activeProducts">0</div>
                                        <div class="stat-label">上架中</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex align-items-center">
                                    <div class="stat-icon bg-warning bg-opacity-10 text-warning me-3">
                                        <i class="bi bi-cart-check"></i>
                                    </div>
                                    <div>
                                        <div class="stat-value" id="totalExchanges">0</div>
                                        <div class="stat-label">兑换次数</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="d-flex align-items-center">
                                    <div class="stat-icon bg-danger bg-opacity-10 text-danger me-3">
                                        <i class="bi bi-coin"></i>
                                    </div>
                                    <div>
                                        <div class="stat-value" id="totalPointsConsumed">0</div>
                                        <div class="stat-label">累计消耗积分</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 商品列表 -->
                <div class="card content-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-grid-3x3-gap me-2"></i>商品管理</span>
                        <small class="text-muted" id="productCount">共 0 条</small>
                    </div>
                    <div class="card-body">
                        <div class="row g-3" id="productGrid">
                            <div class="empty-state w-100">
                                <i class="bi bi-box-seam" style="font-size:48px;color:#ccc;"></i>
                                <p class="mt-3">暂无商品</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 商品Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-plus-lg me-2"></i>添加商品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">商品名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="productName" placeholder="请输入商品名称" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">商品描述</label>
                                <textarea class="form-control" id="productDesc" rows="2" placeholder="商品描述..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">商品类型 <span class="text-danger">*</span></label>
                                <select class="form-select" id="productType" required>
                                    <option value="virtual">虚拟商品</option>
                                    <option value="coupon">优惠券</option>
                                    <option value="physical">实物奖品</option>
                                    <option value="feature">功能解锁</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">所需积分 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="productPoints" placeholder="例如: 200" min="1" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">库存数量</label>
                                <input type="number" class="form-control" id="productStock" placeholder="-1表示不限量" value="-1">
                                <div class="form-text" style="font-size:0.75rem;">-1 表示不限量</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">每人限购</label>
                                <input type="number" class="form-control" id="productLimit" placeholder="0表示不限购" value="0">
                                <div class="form-text" style="font-size:0.75rem;">0 表示不限购</div>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="productActive" checked>
                                    <label class="form-check-label" for="productActive">上架商品</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allProducts = [];
        let modalInstance = null;

        const typeColors = {
            'virtual': { bg: 'linear-gradient(135deg,#667eea,#764ba2)', label: '虚拟商品' },
            'coupon': { bg: 'linear-gradient(135deg,#43e97b,#38f9d7)', label: '优惠券' },
            'physical': { bg: 'linear-gradient(135deg,#fa709a,#fee140)', label: '实物奖品' },
            'feature': { bg: 'linear-gradient(135deg,#ff6b6b,#ee5a24)', label: '功能解锁' }
        };
        const typeIcons = {
            'virtual': 'bi-palette',
            'coupon': 'bi-ticket-perforated',
            'physical': 'bi-gift',
            'feature': 'bi-unlock'
        };

        document.addEventListener('DOMContentLoaded', function() {
            modalInstance = new bootstrap.Modal(document.getElementById('productModal'));
            loadProducts();
        });

        async function loadProducts() {
            try {
                const resp = await fetch('/api/admin/shop/products');
                const data = await resp.json();
                if (data.success) {
                    allProducts = data.products || [];
                    renderProducts(allProducts);
                    updateStats(allProducts);
                }
            } catch (e) {
                console.error('加载商品失败:', e);
                showToast('加载失败', 'error');
            }
        }

        function updateStats(products) {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('activeProducts').textContent = products.filter(p => p.status === 'active').length;
            document.getElementById('totalExchanges').textContent = products.reduce((s, p) => s + (p.exchange_count || 0), 0);
            document.getElementById('totalPointsConsumed').textContent = products.reduce((s, p) => s + (p.points_consumed || 0), 0).toLocaleString();
        }

        function renderProducts(products) {
            const container = document.getElementById('productGrid');
            document.getElementById('productCount').textContent = `共 ${products.length} 条`;

            if (products.length === 0) {
                container.innerHTML = `<div class="empty-state w-100">
                    <i class="bi bi-box-seam" style="font-size:48px;color:#ccc;"></i>
                    <p class="mt-3">暂无商品</p>
                </div>`;
                return;
            }

            container.innerHTML = products.map(p => {
                const tc = typeColors[p.type] || typeColors['virtual'];
                const icon = typeIcons[p.type] || 'bi-box';
                const isActive = p.status === 'active';
                const isUnlimited = p.stock === -1;
                const stockText = isUnlimited ? '不限量' : `库存 ${p.stock}`;
                const stockBadge = isUnlimited ? 'bg-success' : (p.stock <= 5 ? 'bg-danger' : 'bg-primary');
                return `
                <div class="col-md-4 col-lg-3">
                    <div class="product-card">
                        <div class="product-img" style="background:${tc.bg};position:relative;">
                            <i class="bi ${icon}"></i>
                            <span class="product-type-badge bg-white text-dark">${tc.label}</span>
                        </div>
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <h6 class="mb-0" style="font-size:0.9rem;">${escapeHtml(p.name)}</h6>
                                <span class="badge ${isActive ? 'bg-success' : 'bg-secondary'}" style="font-size:0.65rem;">${isActive ? '上架' : '下架'}</span>
                            </div>
                            <p class="text-muted mb-2" style="font-size:0.78rem;height:36px;overflow:hidden;">${escapeHtml(p.description || '暂无描述')}</p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold text-warning" style="font-size:1rem;">
                                    <i class="bi bi-coin me-1"></i>${p.points_cost}
                                </span>
                                <span class="badge ${stockBadge}" style="font-size:0.7rem;">${stockText}</span>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-outline-primary w-100" onclick="editProduct('${p.id}')">
                                    <i class="bi bi-pencil me-1"></i>编辑
                                </button>
                                <button class="btn btn-sm btn-outline-danger w-100" onclick="deleteProduct('${p.id}')">
                                    <i class="bi bi-trash me-1"></i>删除
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function showProductModal() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-lg me-2"></i>添加商品';
            modalInstance.show();
        }

        function editProduct(id) {
            const p = allProducts.find(x => String(x.id) === String(id));
            if (!p) return;
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name || '';
            document.getElementById('productDesc').value = p.description || '';
            document.getElementById('productType').value = p.type || 'virtual';
            document.getElementById('productPoints').value = p.points_cost || '';
            document.getElementById('productStock').value = p.stock !== undefined ? p.stock : -1;
            document.getElementById('productLimit').value = p.limit_per_user || 0;
            document.getElementById('productActive').checked = p.status === 'active';
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square me-2"></i>编辑商品';
            modalInstance.show();
        }

        async function saveProduct() {
            const id = document.getElementById('productId').value;
            const payload = {
                name: document.getElementById('productName').value,
                description: document.getElementById('productDesc').value,
                type: document.getElementById('productType').value,
                points_cost: parseInt(document.getElementById('productPoints').value) || 0,
                stock: parseInt(document.getElementById('productStock').value) || -1,
                limit_per_user: parseInt(document.getElementById('productLimit').value) || 0,
                status: document.getElementById('productActive').checked ? 'active' : 'inactive'
            };

            if (!payload.name || payload.points_cost <= 0) {
                showToast('请填写必填项', 'error');
                return;
            }

            try {
                const url = id ? `/api/admin/shop/products/${id}` : '/api/admin/shop/products';
                const method = id ? 'PUT' : 'POST';
                const resp = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (data.success) {
                    showToast(id ? '更新成功' : '添加成功');
                    modalInstance.hide();
                    loadProducts();
                } else {
                    showToast(data.message || '操作失败', 'error');
                }
            } catch (e) {
                showToast('请求失败', 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('确定要删除该商品吗？')) return;
            try {
                const resp = await fetch(`/api/admin/shop/products/${id}`, { method: 'DELETE' });
                const data = await resp.json();
                if (data.success) {
                    showToast('删除成功');
                    loadProducts();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showToast('请求失败', 'error');
            }
        }

        function refreshData() {
            loadProducts();
            showToast('数据已刷新');
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(msg, type='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast show ${type==='success'?'bg-success':'bg-danger'} text-white`;
            t.innerHTML = `<div class="toast-body">${msg}</div>`;
            t.style.minWidth = '200px';
            c.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
        }
    </script>
</body>
</html>
