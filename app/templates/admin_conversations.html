<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话记录管理 - 泰小虎后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            background: rgba(67,233,123,0.2);
            border-left: 3px solid #43e97b;
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .content-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card .card-header {
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            padding: 16px 20px;
        }

        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-value { font-size: 26px; font-weight: 700; color: #43e97b; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

        /* 会话列表 */
        .session-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .session-item:hover { background: #f6ffed; }
        .session-item:last-child { border-bottom: none; }
        .session-id { font-family: monospace; color: #1890ff; font-size: 13px; }
        .kb-indicator {
            display: inline-flex; align-items: center; gap: 4px;
            background: #e6f7ff; color: #1890ff; padding: 2px 8px;
            border-radius: 10px; font-size: 11px;
        }

        /* 对话详情弹窗 */
        .detail-modal .modal-body { padding: 0; }
        .detail-modal .modal-dialog { max-width: 950px; }

        /* Tab 导航 */
        .detail-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
            background: #fafafa;
        }
        .detail-tabs .tab-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            user-select: none;
        }
        .detail-tabs .tab-item:hover { color: #1890ff; }
        .detail-tabs .tab-item.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
            background: #fff;
            font-weight: 600;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 用户画像表单 */
        .profile-form { padding: 20px; }
        .profile-form .form-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
        .profile-form .form-control { font-size: 13px; }

        /* Badcase 列表 */
        .badcase-list { padding: 16px 20px; }
        .badcase-item {
            background: #fff; border: 1px solid #f0f0f0; border-radius: 8px;
            padding: 12px 14px; margin-bottom: 10px;
        }
        .badcase-item:last-child { margin-bottom: 0; }
        .badcase-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badcase-category { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .badcase-severity-high { background: #fde8e8; color: #c0392b; }
        .badcase-severity-medium { background: #fef3cd; color: #856404; }
        .badcase-severity-low { background: #e6f7ff; color: #1890ff; }

        /* 对话消息 */
        .chat-message { display: flex; margin-bottom: 0; gap: 10px; padding: 16px 20px; border-bottom: 1px solid #f5f5f5; }
        .chat-message:hover { background: #fafafa; }
        .chat-message.user { flex-direction: row-reverse; }
        .chat-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .chat-message.agent .chat-avatar { background: #e6f7ff; }
        .chat-message.user .chat-avatar { background: #f6ffed; }
        .chat-bubble { max-width: 75%; }
        .chat-content {
            background: #f5f5f5; padding: 10px 14px;
            border-radius: 12px; font-size: 13px; line-height: 1.7;
            white-space: pre-wrap; word-break: break-word;
        }
        .chat-message.agent .chat-content { background: #e6f7ff; }
        .chat-message.user .chat-content { background: #f6ffed; }
        .chat-meta { font-size: 11px; color: #aaa; margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .chat-meta .tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; }
        .tag-intent { background: #fff7e6; color: #fa8c16; }
        .tag-state { background: #f0f5ff; color: #2f54eb; }
        .tag-kb { background: #e6f7ff; color: #1890ff; cursor: pointer; }
        .tag-kb:hover { background: #bae7ff; }

        /* Badcase 标记按钮 */
        .badcase-btn {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            font-size: 12px;
            color: #c0392b;
            border: 1px solid #fde8e8;
            background: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .chat-message:hover .badcase-btn { opacity: 1; }
        .badcase-btn:hover { background: #fde8e8; }
        .badcase-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fde8e8;
            color: #c0392b;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        /* 知识库调用详情展开面板 */
        .kb-detail-panel {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
            background: #fafafa;
            border-radius: 8px;
            margin-top: 8px;
        }
        .kb-detail-panel.expanded { max-height: 600px; overflow-y: auto; }
        .kb-detail-inner { padding: 12px 16px; }
        .kb-detail-title {
            font-size: 12px; font-weight: 600; color: #555;
            margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }
        .kb-chunk-item {
            background: #fff; border: 1px solid #e8e8e8; border-radius: 6px;
            padding: 10px 12px; margin-bottom: 8px; font-size: 12px;
            border-left: 3px solid #43e97b;
        }
        .kb-chunk-item:last-child { margin-bottom: 0; }
        .kb-chunk-title { font-weight: 600; color: #333; margin-bottom: 4px; }
        .kb-chunk-content { color: #666; line-height: 1.5; max-height: 80px; overflow: hidden; }
        .kb-chunk-meta { color: #999; font-size: 11px; margin-top: 6px; display: flex; gap: 12px; }

        .llm-call-item {
            background: #fff; border: 1px solid #e8e8e8; border-radius: 6px;
            padding: 8px 12px; margin-bottom: 6px; font-size: 12px;
            border-left: 3px solid #722ed1;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 链路追踪折叠面板 */
        .trace-panel {
            margin-top: 10px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
        }
        .trace-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f0f5ff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .trace-panel-header:hover {
            background: #e6f0ff;
        }
        .trace-panel-header .trace-title {
            font-size: 13px;
            font-weight: 600;
            color: #2f54eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .trace-panel-header .trace-summary {
            font-size: 12px;
            color: #888;
        }
        .trace-panel-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .trace-panel-content.expanded {
            max-height: 800px;
            overflow-y: auto;
        }
        .trace-panel-inner {
            padding: 14px 16px;
        }
        .trace-timeline {
            position: relative;
            padding-left: 24px;
        }
        .trace-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e8e8e8;
        }
        .trace-node {
            position: relative;
            margin-bottom: 16px;
            padding: 12px 14px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
        }
        .trace-node:last-child {
            margin-bottom: 0;
        }
        .trace-node::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 16px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #52c41a;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #52c41a;
        }
        .trace-node.error::before {
            background: #ff4d4f;
            box-shadow: 0 0 0 2px #ff4d4f;
        }
        .trace-node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .trace-node-name {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }
        .trace-node-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #888;
        }
        .trace-node-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .trace-node-status.success {
            color: #52c41a;
        }
        .trace-node-status.error {
            color: #ff4d4f;
        }
        .trace-node-duration {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .trace-kb-sources {
            margin-top: 10px;
            padding: 10px;
            background: #f6ffed;
            border-radius: 6px;
            border-left: 3px solid #52c41a;
        }
        .trace-kb-sources-title {
            font-size: 12px;
            font-weight: 600;
            color: #389e0d;
            margin-bottom: 8px;
        }
        .trace-kb-source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            background: #fff;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .trace-kb-source-item:last-child {
            margin-bottom: 0;
        }
        .trace-kb-source-name {
            color: #333;
        }
        .trace-kb-source-score {
            color: #52c41a;
            font-weight: 600;
        }
        .trace-empty {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 13px;
        }

        /* Badcase 标记按钮 */
        .badcase-btn {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #ff4d4f;
            background: #fff;
            color: #ff4d4f;
            cursor: pointer;
            transition: all 0.2s;
        }
        .badcase-btn:hover {
            background: #ff4d4f;
            color: #fff;
        }

        .empty-state { text-align: center; padding: 60px; color: #999; }
        .empty-state-icon { font-size: 48px; margin-bottom: 15px; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            {% set active_page = '/admin/conversations' %}{% include '_sidebar.html' %}

            <!-- 主内容 -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>对话记录管理</h4>
                    <div>
                        <button class="btn btn-outline-success btn-sm me-2" onclick="refreshData()">
                            <i class="bi bi-arrow-clockwise me-1"></i>刷新
                        </button>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalSessions">0</div>
                        <div class="stat-label">总会话数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalMessages">0</div>
                        <div class="stat-label">总消息数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeSessions">0</div>
                        <div class="stat-label">活跃会话</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="kbCalls">0</div>
                        <div class="stat-label">知识库调用</div>
                    </div>
                </div>

                <!-- LLM调用统计 -->
                <div class="card content-card mb-3" style="border-left: 3px solid #722ed1;">
                    <div class="card-header d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, #f9f0ff 0%, #fff 100%);">
                        <span><i class="bi bi-cpu me-2" style="color:#722ed1;"></i>模型(LLM)调用统计</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadLlmStats()">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>
                    <div class="card-body py-2">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-activity me-2" style="color:#722ed1;"></i>
                                    <div>
                                        <div class="fw-bold" id="llmTotalCalls" style="color:#722ed1;">0</div>
                                        <small class="text-muted">总调用次数</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-hash me-2" style="color:#1890ff;"></i>
                                    <div>
                                        <div class="fw-bold" id="llmTotalTokens" style="color:#1890ff;">0</div>
                                        <small class="text-muted">总Token消耗</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-clock me-2" style="color:#fa8c16;"></i>
                                    <div>
                                        <div class="fw-bold" id="llmAvgTime" style="color:#fa8c16;">0ms</div>
                                        <small class="text-muted">平均响应时间</small>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-check-circle me-2" style="color:#52c41a;"></i>
                                    <div>
                                        <div class="fw-bold" id="llmSuccessRate" style="color:#52c41a;">0%</div>
                                        <small class="text-muted">成功率</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 筛选栏 -->
                <div class="card content-card mb-3">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-5">
                                <input type="text" class="form-control form-control-sm" id="searchInput"
                                       placeholder="搜索会话ID或用户ID..." onkeyup="searchSessions()">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select form-select-sm" id="filterKb" onchange="searchSessions()">
                                    <option value="all">全部会话</option>
                                    <option value="with_kb">包含知识库调用</option>
                                    <option value="without_kb">无知识库调用</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select form-select-sm" id="filterStatus" onchange="searchSessions()">
                                    <option value="all">全部状态</option>
                                    <option value="active">进行中</option>
                                    <option value="ended">已结束</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-success btn-sm w-100" onclick="loadConversations()">
                                    <i class="bi bi-search me-1"></i>查询
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 会话列表 -->
                <div class="card content-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-chat-square-text me-2"></i>会话列表</span>
                        <small class="text-muted" id="sessionCount">共 0 条</small>
                    </div>
                    <div id="sessionList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无对话记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 对话详情弹窗 (Bootstrap Modal) -->
    <div class="modal fade detail-modal" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-chat-dots me-2"></i>对话详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 动态渲染 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Badcase 标记 Modal -->
    <div class="modal fade" id="badcaseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2 text-danger"></i>标记 Badcase</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="badcaseForm">
                        <input type="hidden" id="bcSessionId">
                        <input type="hidden" id="bcMessageIndex">
                        <div class="mb-3">
                            <label class="form-label">分类 <span class="text-danger">*</span></label>
                            <select class="form-select" id="bcCategory" required>
                                <option value="意图识别错误">意图识别错误</option>
                                <option value="推荐不当">推荐不当</option>
                                <option value="回复不当">回复不当</option>
                                <option value="知识缺失">知识缺失</option>
                                <option value="安全风险">安全风险</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">严重程度 <span class="text-danger">*</span></label>
                            <select class="form-select" id="bcSeverity" required>
                                <option value="low">低</option>
                                <option value="medium" selected>中</option>
                                <option value="high">高</option>
                                <option value="critical">严重</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">问题描述 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="bcDescription" rows="3" placeholder="请描述具体问题..." required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">处理人</label>
                            <input type="text" class="form-control" id="bcAssignedTo" value="管理员">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">对话片段</label>
                            <textarea class="form-control" id="bcSnippet" rows="3" readonly style="background:#f8f9fa; font-size:12px;"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="submitBadcase()">
                        <i class="bi bi-flag-fill me-1"></i>提交标记
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allSessions = [];
        let allSessionDetails = {}; // 缓存会话详情，用于筛选

        document.addEventListener('DOMContentLoaded', function() {
            loadConversations();
            loadKBStats();
            loadLlmStats();
        });

        // ==================== LLM统计加载 ====================

        async function loadLlmStats() {
            try {
                const resp = await fetch('/api/v2/llm/records?limit=1');
                const data = await resp.json();
                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('llmTotalCalls').textContent = stats.total_calls || 0;
                    document.getElementById('llmTotalTokens').textContent = stats.total_tokens || 0;
                    document.getElementById('llmAvgTime').textContent = (stats.avg_response_time_ms || 0) + 'ms';
                    document.getElementById('llmSuccessRate').textContent = (stats.success_rate || 0) + '%';
                }
            } catch (e) {
                console.error('加载LLM统计失败:', e);
            }
        }

        // ==================== 数据加载 ====================

        async function loadConversations() {
            try {
                const resp = await fetch('/api/v2/conversations?limit=100');
                const data = await resp.json();
                if (data.success) {
                    allSessions = data.sessions;
                    // 预加载每个会话是否有知识库调用
                    allSessionDetails = {};
                    for (const s of allSessions) {
                        allSessionDetails[s.session_id] = { hasKbCall: false };
                    }
                    renderSessions(allSessions);
                    updateStats(allSessions);
                }
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        async function loadKBStats() {
            try {
                const resp = await fetch('/api/v2/kb/stats');
                const data = await resp.json();
                if (data.success) {
                    document.getElementById('kbCalls').textContent = data.stats.total_calls;
                }
            } catch (e) {}
        }

        // ==================== 会话列表渲染 ====================

        function renderSessions(sessions) {
            const container = document.getElementById('sessionList');
            document.getElementById('sessionCount').textContent = `共 ${sessions.length} 条`;

            if (sessions.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>暂无对话记录</p></div>';
                return;
            }

            container.innerHTML = sessions.map(s => {
                const hasKb = allSessionDetails[s.session_id]?.hasKbCall;
                return `
                <div class="session-item" onclick="showDetail('${s.session_id}')">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="session-id"><i class="bi bi-hash me-1"></i>${s.session_id}</span>
                        <span class="text-muted" style="font-size:12px;">${formatTime(s.started_at)}</span>
                    </div>
                    <div class="d-flex gap-3 align-items-center" style="font-size:13px; color:#666;">
                        <span><i class="bi bi-chat me-1"></i>${s.total_messages} 条消息</span>
                        <span><i class="bi bi-person me-1"></i>${s.user_id || '匿名用户'}</span>
                        ${hasKb ? '<span class="kb-indicator"><i class="bi bi-database"></i>有知识库调用</span>' : ''}
                        <span class="badge ${s.is_active ? 'bg-success' : 'bg-secondary'}" style="font-size:10px;">
                            ${s.is_active ? '进行中' : '已结束'}
                        </span>
                    </div>
                </div>`;
            }).join('');
        }

        function updateStats(sessions) {
            document.getElementById('totalSessions').textContent = sessions.length;
            document.getElementById('totalMessages').textContent = sessions.reduce((s, x) => s + x.total_messages, 0);
            document.getElementById('activeSessions').textContent = sessions.filter(s => s.is_active).length;
        }

        // ==================== 搜索筛选 ====================

        function searchSessions() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const kbFilter = document.getElementById('filterKb').value;
            const statusFilter = document.getElementById('filterStatus').value;

            const filtered = allSessions.filter(s => {
                // 关键词
                if (keyword && !s.session_id.toLowerCase().includes(keyword) &&
                    !(s.user_id && s.user_id.toLowerCase().includes(keyword))) return false;
                // 知识库调用筛选
                if (kbFilter === 'with_kb' && !allSessionDetails[s.session_id]?.hasKbCall) return false;
                if (kbFilter === 'without_kb' && allSessionDetails[s.session_id]?.hasKbCall) return false;
                // 状态筛选
                if (statusFilter === 'active' && !s.is_active) return false;
                if (statusFilter === 'ended' && s.is_active) return false;
                return true;
            });
            renderSessions(filtered);
        }

        // ==================== 对话详情 ====================

        async function showDetail(sessionId) {
            try {
                const resp = await fetch(`/api/v2/conversations/${sessionId}`);
                const data = await resp.json();
                if (data.success) {
                    const session = data.session;
                    // 检测是否有知识库调用
                    const hasKbCall = session.messages.some(m =>
                        m.knowledge_base_calls && m.knowledge_base_calls.length > 0
                    );
                    allSessionDetails[sessionId] = { hasKbCall };

                    renderDetail(session);
                    const modal = new bootstrap.Modal(document.getElementById('detailModal'));
                    modal.show();
                }
            } catch (e) {
                console.error('加载详情失败:', e);
            }
        }

        // ==================== 链路追踪面板 ====================

        function renderTracePanel(sessionId, msgIdx) {
            return `
                <div class="trace-panel" id="tracePanel_${sessionId}_${msgIdx}">
                    <div class="trace-panel-header" onclick="toggleTracePanel('tracePanel_${sessionId}_${msgIdx}')">
                        <div class="trace-title">
                            <i class="bi bi-diagram-3"></i>
                            <span>链路追踪</span>
                        </div>
                        <div class="trace-summary">
                            <span id="traceSummary_${sessionId}_${msgIdx}">加载中...</span>
                            <i class="bi bi-chevron-down ms-2" id="traceIcon_${sessionId}_${msgIdx}"></i>
                        </div>
                    </div>
                    <div class="trace-panel-content" id="traceContent_${sessionId}_${msgIdx}">
                        <div class="trace-panel-inner" id="traceInner_${sessionId}_${msgIdx}">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                                <span class="ms-2 text-muted" style="font-size:13px;">加载链路数据...</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function toggleTracePanel(panelId) {
            const panel = document.getElementById(panelId);
            if (!panel) return;
            const content = panel.querySelector('.trace-panel-content');
            const icon = panel.querySelector('[id^="traceIcon_"]');
            const isExpanded = content.classList.contains('expanded');

            if (!isExpanded) {
                content.classList.add('expanded');
                if (icon) icon.classList.replace('bi-chevron-down', 'bi-chevron-up');
                // 首次展开时加载数据
                const innerId = content.querySelector('[id^="traceInner_"]')?.id;
                if (innerId && document.getElementById(innerId).dataset.loaded !== 'true') {
                    const parts = panelId.split('_');
                    const sessionId = parts.slice(1, parts.length - 1).join('_');
                    const msgIdx = parts[parts.length - 1];
                    await loadTraceData(sessionId, msgIdx);
                }
            } else {
                content.classList.remove('expanded');
                if (icon) icon.classList.replace('bi-chevron-up', 'bi-chevron-down');
            }
            event.stopPropagation();
        }

        async function loadTraceData(sessionId, msgIdx) {
            const inner = document.getElementById(`traceInner_${sessionId}_${msgIdx}`);
            const summary = document.getElementById(`traceSummary_${sessionId}_${msgIdx}`);
            if (!inner) return;

            try {
                const resp = await fetch(`/api/admin/traces/by-session/${sessionId}`);
                const data = await resp.json();
                if (data.success && data.traces && data.traces.length > 0) {
                    // 根据消息索引匹配对应的 trace（简单策略：按顺序匹配助手消息对应的 trace）
                    const assistantMsgIndices = [];
                    const allMessages = document.querySelectorAll('.chat-message.agent');
                    allMessages.forEach((el, i) => {
                        const idx = parseInt(el.dataset.msgIdx, 10);
                        assistantMsgIndices.push(idx);
                    });
                    const traceIndex = assistantMsgIndices.indexOf(parseInt(msgIdx, 10));
                    const trace = (traceIndex >= 0 && traceIndex < data.traces.length) ? data.traces[traceIndex] : data.traces[0];

                    if (trace) {
                        const totalDuration = trace.total_duration_ms || 0;
                        const nodeCount = trace.nodes ? trace.nodes.length : 0;
                        if (summary) summary.textContent = `${nodeCount} 个节点 · ${totalDuration}ms`;

                        inner.innerHTML = renderTraceTimeline(trace);
                        inner.dataset.loaded = 'true';
                        return;
                    }
                }
                // 无数据
                if (summary) summary.textContent = '暂无数据';
                inner.innerHTML = '<div class="trace-empty"><i class="bi bi-inbox" style="font-size:1.5rem;"></i><p class="mt-2">暂无链路追踪数据</p></div>';
                inner.dataset.loaded = 'true';
            } catch (e) {
                console.error('加载链路追踪失败:', e);
                if (summary) summary.textContent = '加载失败';
                inner.innerHTML = '<div class="trace-empty text-danger"><i class="bi bi-exclamation-circle" style="font-size:1.5rem;"></i><p class="mt-2">加载失败</p></div>';
                inner.dataset.loaded = 'true';
            }
        }

        function renderTraceTimeline(trace) {
            if (!trace.nodes || trace.nodes.length === 0) {
                return '<div class="trace-empty">暂无节点数据</div>';
            }

            const nodeTypeMap = {
                'intent_recognition': '意图识别',
                'profile_query': '画像查询',
                'knowledge_query': '知识查询',
                'knowledge_retrieval': '知识检索',
                'product_recommend': '推荐生成',
                'dialogue_response': '回复生成',
                'answer_generation': '回复生成',
                'safety_check': '安全检查',
                'profile_collection': '画像采集'
            };

            let html = '<div class="trace-timeline">';
            trace.nodes.forEach(node => {
                const nodeName = nodeTypeMap[node.node_type] || node.node_type;
                const isError = node.status === 'error';
                const statusIcon = isError ? '<i class="bi bi-x-circle-fill"></i>' : '<i class="bi bi-check-circle-fill"></i>';
                const statusClass = isError ? 'error' : 'success';

                let kbSourcesHtml = '';
                if (node.node_type === 'knowledge_retrieval' || node.node_type === 'knowledge_query') {
                    const docs = node.output_data && node.output_data.retrieved_docs ? node.output_data.retrieved_docs : [];
                    if (docs.length > 0) {
                        kbSourcesHtml = `
                            <div class="trace-kb-sources">
                                <div class="trace-kb-sources-title"><i class="bi bi-journal-text me-1"></i>命中知识库来源</div>
                                ${docs.map(doc => `
                                    <div class="trace-kb-source-item">
                                        <span class="trace-kb-source-name">${escapeHtml(doc.title || doc.doc_id || '未知来源')}</span>
                                        <span class="trace-kb-source-score">${(doc.relevance || 0).toFixed(2)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                }

                html += `
                    <div class="trace-node ${isError ? 'error' : ''}">
                        <div class="trace-node-header">
                            <span class="trace-node-name">${escapeHtml(nodeName)}</span>
                            <div class="trace-node-meta">
                                <span class="trace-node-duration">${node.duration_ms || 0}ms</span>
                                <span class="trace-node-status ${statusClass}">${statusIcon} ${isError ? '失败' : '成功'}</span>
                            </div>
                        </div>
                        ${node.error_message ? `<div style="color:#ff4d4f; font-size:12px; margin-top:4px;"><i class="bi bi-exclamation-triangle me-1"></i>${escapeHtml(node.error_message)}</div>` : ''}
                        ${kbSourcesHtml}
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // ==================== 工具函数 ====================

        function refreshData() {
            loadConversations();
            loadKBStats();
            loadLlmStats();
            showToast('数据已刷新');
        }

        function formatTime(iso) {
            if (!iso) return '-';
            try {
                const d = new Date(iso);
                return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
            } catch(e) { return iso; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
        }

        // ==================== Badcase 标记功能 ====================

        let currentSessionMessages = [];

        function openBadcaseModal(sessionId, msgIdx) {
            const msg = currentSessionMessages[msgIdx];
            if (!msg) return;

            // 找到前一条用户消息作为对话片段的一部分
            let userMsg = '';
            for (let i = msgIdx - 1; i >= 0; i--) {
                if (currentSessionMessages[i].message_type === 'user') {
                    userMsg = currentSessionMessages[i].content;
                    break;
                }
            }
            const assistantReply = msg.content || '';
            const snippet = `用户: ${userMsg}\n\n助手: ${assistantReply.substring(0, 200)}${assistantReply.length > 200 ? '...' : ''}`;

            document.getElementById('bcSessionId').value = sessionId;
            document.getElementById('bcMessageIndex').value = msgIdx;
            document.getElementById('bcCategory').value = '其他';
            document.getElementById('bcSeverity').value = 'medium';
            document.getElementById('bcDescription').value = '';
            document.getElementById('bcAssignedTo').value = '管理员';
            document.getElementById('bcSnippet').value = snippet;

            const modal = new bootstrap.Modal(document.getElementById('badcaseModal'));
            modal.show();
        }

        async function submitBadcase() {
            const sessionId = document.getElementById('bcSessionId').value;
            const msgIdx = parseInt(document.getElementById('bcMessageIndex').value, 10);
            const category = document.getElementById('bcCategory').value;
            const severity = document.getElementById('bcSeverity').value;
            const description = document.getElementById('bcDescription').value.trim();
            const assignedTo = document.getElementById('bcAssignedTo').value;
            const conversationSnippet = document.getElementById('bcSnippet').value;

            if (!description) {
                showToast('请填写问题描述', 'error');
                return;
            }

            try {
                const resp = await fetch('/api/admin/badcases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        category: category,
                        severity: severity,
                        description: description,
                        assigned_to: assignedTo,
                        conversation_snippet: conversationSnippet
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    showToast('Badcase 标记成功');
                    const modalEl = document.getElementById('badcaseModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    if (modal) modal.hide();

                    // 在当前消息旁显示红色 Badcase 标记徽章
                    const badge = document.getElementById(`bc-badge-${sessionId}-${msgIdx}`);
                    if (badge) badge.style.display = 'inline-flex';

                    // 如果当前在 Badcase Tab，刷新列表
                    const badcasesTab = document.querySelector('.detail-tabs .tab-item[data-tab="badcases"]');
                    if (badcasesTab && badcasesTab.classList.contains('active')) {
                        loadSessionBadcases(sessionId);
                    }
                } else {
                    showToast(data.error || '标记失败', 'error');
                }
            } catch (e) {
                showToast('提交失败: ' + e, 'error');
            }
        }

        async function loadBadcaseBadgesForSession(sessionId) {
            try {
                const resp = await fetch(`/api/admin/badcases?limit=100`);
                const data = await resp.json();
                if (data.success && data.badcases) {
                    const sessionBadcases = data.badcases.filter(b => b.session_id === sessionId);
                    // 简单策略：将会话中所有助手消息都标记上徽章（因为目前后端没有 message_index 字段精确匹配）
                    // 如果后端有 message_index 可以精确匹配，这里可根据 b.message_index 来显示
                    // 目前先将会话下所有助手消息的徽章都显示出来
                    const badges = document.querySelectorAll(`[id^="bc-badge-${sessionId}-"]`);
                    if (sessionBadcases.length > 0) {
                        badges.forEach(b => b.style.display = 'inline-flex');
                    }
                }
            } catch (e) {
                console.error('加载 Badcase 徽章失败:', e);
            }
        }

        function showToast(msg, type='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast show ${type==='success'?'bg-success':'bg-danger'} text-white`;
            t.innerHTML = `<div class="toast-body">${msg}</div>`;
            t.style.minWidth = '200px';
            c.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
        }
    </script>
</body>
</html>
