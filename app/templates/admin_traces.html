<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 调用链路追踪</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link.active {
            background: rgba(67,233,123,0.2);
            border-left: 3px solid #43e97b;
        }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .content-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .content-card .card-header {
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            padding: 16px 20px;
        }
        .timeline-container { position: relative; padding-left: 40px; }
        .timeline-line {
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e5e7eb;
        }
        .timeline-node {
            position: relative;
            margin-bottom: 20px;
        }
        .timeline-dot {
            position: absolute;
            left: -34px;
            top: 6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #e5e7eb;
            z-index: 1;
        }
        .timeline-dot.intent { background: #667eea; }
        .timeline-dot.kb { background: #43e97b; }
        .timeline-dot.llm { background: #fa8c16; }
        .timeline-dot.recommend { background: #ff6b6b; }
        .timeline-dot.reply { background: #1890ff; }
        .timeline-dot.request { background: #722ed1; }
        .node-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .node-card:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.1); }
        .node-card.warning { border-left: 4px solid #fa8c16; }
        .node-card.error { border-left: 4px solid #ff6b6b; }
        .node-card.success { border-left: 4px solid #43e97b; }
        .node-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .node-detail.expanded { max-height: 600px; overflow-y: auto; }
        .node-detail-inner {
            padding: 12px 0 0;
            margin-top: 10px;
            border-top: 1px dashed #e8e8e8;
        }
        .trace-header {
            background: linear-gradient(135deg, #f6ffed 0%, #e6f7ff 100%);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .trace-list-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .trace-list-item:hover { background: #f6ffed; }
        .trace-list-item:last-child { border-bottom: none; }
        .empty-state { text-align: center; padding: 60px; color: #999; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .json-preview {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 p-0 sidebar">
                <div class="brand">
                    <i class="bi bi-shield-check"></i> 泰小虎后台管理
                </div>
                <nav class="nav flex-column">
                    <a href="/admin" class="nav-link">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a href="/admin/conversations" class="nav-link">
                        <i class="bi bi-chat-square-text"></i> 对话记录
                    </a>
                    <a href="/admin/knowledge/chunks" class="nav-link">
                        <i class="bi bi-database"></i> 知识切片
                    </a>
                    <a href="/admin/profiles" class="nav-link">
                        <i class="bi bi-person-badge"></i> 用户画像
                    </a>
                    <a href="/admin/llm" class="nav-link">
                        <i class="bi bi-cpu"></i> 模型配置
                    </a>
                    <a href="/admin/prompt" class="nav-link">
                        <i class="bi bi-chat-left-text"></i> 提示词配置
                    </a>
                    <a href="/admin/badcases" class="nav-link">
                        <i class="bi bi-bug"></i> Badcase管理
                    </a>
                    <a href="/admin/model-calls" class="nav-link">
                        <i class="bi bi-activity"></i> 模型调用
                    </a>
                    <a href="/admin/traces" class="nav-link active">
                        <i class="bi bi-diagram-3"></i> 调用链路
                    </a>
                    <a href="/admin/points" class="nav-link">
                        <i class="bi bi-coin"></i> 积分管理
                    </a>
                    <a href="/admin/points/config" class="nav-link">
                        <i class="bi bi-sliders"></i> 积分配置
                    </a>
                    <a href="/admin/shop" class="nav-link">
                        <i class="bi bi-shop"></i> 积分商城
                    </a>
                    <a href="/admin/data-export" class="nav-link">
                        <i class="bi bi-download"></i> 数据导出
                    </a>
                    <a href="/" class="nav-link">
                        <i class="bi bi-chat-dots"></i> 返回前台
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>调用链路追踪</h4>
                    <button class="btn btn-outline-success btn-sm" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise me-1"></i>刷新
                    </button>
                </div>

                <div class="row g-3">
                    <!-- Trace列表 -->
                    <div class="col-md-4">
                        <div class="card content-card" style="max-height: calc(100vh - 140px); overflow-y: auto;">
                            <div class="card-header">
                                <i class="bi bi-list-ul me-2"></i>Trace列表
                            </div>
                            <div id="traceList">
                                <div class="empty-state">
                                    <i class="bi bi-diagram-3" style="font-size:48px;color:#ccc;"></i>
                                    <p class="mt-3">暂无Trace记录</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Trace详情 -->
                    <div class="col-md-8">
                        <div id="traceDetail" style="display:none;">
                            <!-- Trace头部信息 -->
                            <div class="trace-header">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <div class="text-muted" style="font-size:0.8rem;">Trace ID</div>
                                        <div class="fw-bold" style="font-size:1.1rem;" id="detailTraceId">-</div>
                                    </div>
                                    <div class="text-end">
                                        <div class="text-muted" style="font-size:0.8rem;">总耗时</div>
                                        <div class="fw-bold text-primary" style="font-size:1.4rem;" id="detailTotalTime">-</div>
                                    </div>
                                </div>
                                <div class="d-flex gap-4 mt-2" style="font-size:0.85rem;">
                                    <span class="text-muted">会话: <span class="text-dark" id="detailSessionId">-</span></span>
                                    <span class="text-muted">用户: <span class="text-dark" id="detailUserId">-</span></span>
                                    <span class="text-muted">时间: <span class="text-dark" id="detailTime">-</span></span>
                                </div>
                            </div>

                            <!-- 时间轴 -->
                            <div class="card content-card">
                                <div class="card-header">
                                    <i class="bi bi-clock-history me-2"></i>链路时间轴
                                </div>
                                <div class="card-body">
                                    <div class="timeline-container" id="timelineContainer">
                                        <div class="timeline-line"></div>
                                        <!-- 动态渲染 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="traceEmpty" class="card content-card">
                            <div class="card-body empty-state">
                                <i class="bi bi-diagram-3" style="font-size:64px;color:#ddd;"></i>
                                <p class="mt-3">请从左侧选择一个Trace查看详情</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allTraces = [];
        let currentTrace = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadTraces();
        });

        async function loadTraces() {
            try {
                const resp = await fetch('/api/admin/traces?limit=50');
                const data = await resp.json();
                if (data.success) {
                    allTraces = data.traces || [];
                    renderTraceList(allTraces);
                }
            } catch (e) {
                console.error('加载Trace失败:', e);
                showToast('加载失败', 'error');
            }
        }

        function renderTraceList(traces) {
            const container = document.getElementById('traceList');
            if (traces.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="bi bi-diagram-3" style="font-size:48px;color:#ccc;"></i>
                    <p class="mt-3">暂无Trace记录</p>
                </div>`;
                return;
            }

            container.innerHTML = traces.map(t => `
                <div class="trace-list-item" onclick="loadTraceDetail('${t.trace_id}')">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-bold" style="font-size:0.85rem;">${t.trace_id}</span>
                        <span class="badge bg-light text-dark" style="font-size:0.7rem;">${t.node_count || 0} 节点</span>
                    </div>
                    <div class="d-flex gap-3 align-items-center" style="font-size:0.78rem;color:#888;">
                        <span><i class="bi bi-chat-square me-1"></i>${t.session_id || '-'}</span>
                        <span><i class="bi bi-clock me-1"></i>${formatTime(t.created_at)}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadTraceDetail(traceId) {
            try {
                const resp = await fetch(`/api/admin/traces/${traceId}`);
                const data = await resp.json();
                if (data.success && data.trace) {
                    currentTrace = data.trace;
                    renderTraceDetail(data.trace);
                }
            } catch (e) {
                showToast('加载详情失败', 'error');
            }
        }

        function renderTraceDetail(trace) {
            document.getElementById('traceEmpty').style.display = 'none';
            document.getElementById('traceDetail').style.display = 'block';

            document.getElementById('detailTraceId').textContent = trace.trace_id;
            document.getElementById('detailTotalTime').textContent = (trace.total_duration_ms || 0) + 'ms';
            document.getElementById('detailSessionId').textContent = trace.session_id || '-';
            document.getElementById('detailUserId').textContent = trace.user_id || '匿名用户';
            document.getElementById('detailTime').textContent = formatTime(trace.created_at);

            const container = document.getElementById('timelineContainer');
            const nodes = trace.nodes || [];

            if (nodes.length === 0) {
                container.innerHTML = '<div class="text-muted text-center py-4">暂无节点数据</div>';
                return;
            }

            const nodeTypeMap = {
                'request': { name: '用户请求', icon: 'bi-play-fill', cls: 'request' },
                'intent_recognition': { name: '意图识别', icon: 'bi-brain', cls: 'intent' },
                'knowledge_query': { name: '知识库查询', icon: 'bi-database', cls: 'kb' },
                'llm_call': { name: 'LLM调用', icon: 'bi-cpu', cls: 'llm' },
                'product_recommend': { name: '产品推荐', icon: 'bi-box-seam', cls: 'recommend' },
                'reply_generation': { name: '回复生成', icon: 'bi-chat-dots', cls: 'reply' }
            };

            container.innerHTML = '<div class="timeline-line"></div>' + nodes.map((node, idx) => {
                const typeInfo = nodeTypeMap[node.node_type] || { name: node.node_type, icon: 'bi-circle', cls: 'request' };
                const isSlow = node.duration_ms > 2000;
                const hasError = node.status === 'error';
                const cardClass = hasError ? 'error' : (isSlow ? 'warning' : 'success');

                return `
                <div class="timeline-node">
                    <div class="timeline-dot ${typeInfo.cls}"></div>
                    <div class="node-card ${cardClass}" onclick="toggleNodeDetail('nodeDetail_${idx}')">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-2">
                                <i class="bi ${typeInfo.icon}" style="color:#667eea;"></i>
                                <span class="fw-bold" style="font-size:0.9rem;">${typeInfo.name}</span>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                ${isSlow ? '<span class="badge bg-warning text-dark" style="font-size:0.7rem;"><i class="bi bi-exclamation-triangle me-1"></i>慢</span>' : ''}
                                ${hasError ? '<span class="badge bg-danger" style="font-size:0.7rem;"><i class="bi bi-x-circle me-1"></i>失败</span>' : ''}
                                <span class="text-muted" style="font-size:0.85rem;">${node.duration_ms || 0}ms</span>
                                <i class="bi bi-chevron-down text-muted" style="font-size:0.8rem;transition:transform 0.2s;" id="chevron_${idx}"></i>
                            </div>
                        </div>
                        ${node.output_summary ? `<div class="mt-1 text-muted" style="font-size:0.8rem;">${escapeHtml(node.output_summary)}</div>` : ''}

                        <div class="node-detail" id="nodeDetail_${idx}">
                            <div class="node-detail-inner">
                                <div class="row g-2">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">节点ID</label>
                                        <div style="font-size:0.8rem;">${node.node_id}</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">耗时</label>
                                        <div style="font-size:0.8rem;">${node.duration_ms || 0}ms</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">状态</label>
                                        <div style="font-size:0.8rem;" class="${node.status === 'success' ? 'text-success' : 'text-danger'}">${node.status || 'success'}</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">模型</label>
                                        <div style="font-size:0.8rem;">${node.model_name || '-'}</div>
                                    </div>
                                    ${node.input_data ? `
                                    <div class="col-12">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">输入数据</label>
                                        <div class="json-preview">${escapeHtml(typeof node.input_data === 'string' ? node.input_data : JSON.stringify(node.input_data, null, 2))}</div>
                                    </div>` : ''}
                                    ${node.output_data ? `
                                    <div class="col-12">
                                        <label class="form-label text-muted" style="font-size:0.75rem;">输出数据</label>
                                        <div class="json-preview">${escapeHtml(typeof node.output_data === 'string' ? node.output_data : JSON.stringify(node.output_data, null, 2))}</div>
                                    </div>` : ''}
                                    ${node.error_message ? `
                                    <div class="col-12">
                                        <label class="form-label text-danger" style="font-size:0.75rem;">错误信息</label>
                                        <div class="text-danger" style="font-size:0.8rem;">${escapeHtml(node.error_message)}</div>
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleNodeDetail(detailId) {
            const panel = document.getElementById(detailId);
            if (panel) {
                panel.classList.toggle('expanded');
                const idx = detailId.replace('nodeDetail_', '');
                const chevron = document.getElementById('chevron_' + idx);
                if (chevron) {
                    chevron.style.transform = panel.classList.contains('expanded') ? 'rotate(180deg)' : '';
                }
            }
        }

        function refreshData() {
            loadTraces();
            showToast('数据已刷新');
        }

        function formatTime(iso) {
            if (!iso) return '-';
            try {
                const d = new Date(iso);
                return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
            } catch(e) { return iso; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(msg, type='success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast show ${type==='success'?'bg-success':'bg-danger'} text-white`;
            t.innerHTML = `<div class="toast-body">${msg}</div>`;
            t.style.minWidth = '200px';
            c.appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2000);
        }
    </script>
</body>
</html>
